name: Update Books from Issues

on:
  issues:
    types: [opened, edited, labeled, unlabeled, closed, reopened, deleted]

jobs:
  update-books:
    runs-on: ubuntu-latest
    if: |
      contains(github.event.issue.labels.*.name, 'book') ||
      github.event.action == 'labeled' ||
      github.event.action == 'unlabeled'

    permissions:
      contents: write
      issues: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate books.json
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const issues = await github.paginate(
              github.rest.issues.listForRepo,
              {
                owner: context.repo.owner,
                repo:  context.repo.repo,
                labels: 'book',
                state:  'open',
                per_page: 100
              }
            );

            // Correctly parse GitHub Issue Form markdown output (e.g., "### Bengali Title")
            function field(body, name) {
              const re = new RegExp(`###\\s*${name}\\s*\\n+([^#]+)`, 'i');
              const m = (body || '').match(re);
              return m ? m[1].trim() : '';
            }

            // Extract the standard markdown image tag generated by dragging an image into the issue
            function firstImage(body) {
              const m = (body || '').match(/!\[.*?\]\((https?:\/\/[^)]+)\)/);
              return m ? m[1] : '';
            }

            const books = issues.map((issue, idx) => {
              const body = issue.body || '';
              return {
                title:       field(body, 'Bengali Title') || issue.title,
                tag:         field(body, 'Tag'),
                description: field(body, 'Description'),
                link:        field(body, 'Link'),
                image:       firstImage(body) || field(body, 'Image'),
                order:       parseInt(field(body, 'Order') || String(idx + 1), 10)
              };
            });

            books.sort((a, b) => a.order - b.order);

            fs.writeFileSync('books.json', JSON.stringify(books, null, 2) + '\n');
            console.log(`Written ${books.length} book(s) to books.json`);

      - name: Commit & push books.json
        run: |
          git config user.name  "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add books.json
          git diff --staged --quiet || git commit -m "chore: update books.json [skip ci]"
          git push
          
